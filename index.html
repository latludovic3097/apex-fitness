<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>APEX Fitness</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E63946">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APEX">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--cd:#14141f;--cd2:#1a1a2a;--bd:#2a2a3a;--tx:#e8e8f0;--t2:#9898a8;--mt:#5a5a6a;--ac:#E63946;--ok:#2A9D8F;--wa:#F4A261;--ac10:rgba(230,57,70,.12);--ok10:rgba(42,157,143,.12)}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:75px;-webkit-tap-highlight-color:transparent}
.hdr{padding:18px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:900;letter-spacing:5px;color:var(--ac)}
.stats-row{display:flex;gap:6px;padding:0 14px;margin-bottom:14px}
.stat-box{flex:1;background:var(--cd);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--bd)}
.stat-val{font-size:22px;font-weight:900}.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-top:2px}
.sec-title{padding:0 14px 8px;font-size:13px;font-weight:800;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.card{background:var(--cd);border-radius:14px;border:1px solid var(--bd);padding:16px;margin:0 14px 10px}
.sess-card{cursor:pointer;border-left:4px solid var(--ac)}.sess-card:active{background:var(--cd2)}
.sess-inner{display:flex;justify-content:space-between;align-items:center}
.sess-name{font-size:20px;font-weight:900;letter-spacing:3px}
.sess-meta{font-size:11px;color:var(--mt);margin-top:4px}
.sess-muscles{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.muscle-tag{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600}
.reminder{background:var(--ok10);border-color:var(--ok)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--cd);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
.nav-btn{background:none;border:none;color:var(--mt);font-size:9px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 14px;font-family:inherit}
.nav-btn.active{color:var(--ac);font-weight:700}.nav-btn svg{width:20px;height:20px}
.btn{background:var(--ac);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}.btn:active{opacity:.8}
.btn-ok{background:var(--ok)}.btn2{background:none;color:var(--t2);border:1px solid var(--bd);border-radius:10px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.inp{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:14px;width:100%;box-sizing:border-box;font-family:monospace;outline:none}
.inp:focus{border-color:var(--ac)}textarea.inp{resize:vertical;min-height:50px;font-family:inherit}
.prog-bar{background:var(--bd);border-radius:4px;height:4px;margin-top:8px}.prog-fill{height:4px;border-radius:4px;transition:width .3s}
.pills{display:flex;gap:5px;padding:10px 14px;overflow-x:auto}
.pill{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}.pill.active{color:#fff;border-color:transparent}
.ex-imgs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding:4px 0}
.ex-img-wrap{flex-shrink:0;width:140px;height:140px;border-radius:12px;overflow:hidden;border:1px solid var(--bd);background:var(--cd2);position:relative}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover}
.ex-img-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:9px;text-align:center;padding:3px;font-weight:600}
.link-row{display:flex;gap:8px;margin-bottom:14px}
.ex-link{flex:1;display:flex;align-items:center;gap:8px;background:var(--cd2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;text-decoration:none;color:var(--tx);font-size:11px;font-weight:600}
.ex-link:active{border-color:var(--ac)}
.ex-link svg{width:22px;height:22px;flex-shrink:0}
.ex-name{font-size:17px;font-weight:800}.ex-sets-info{font-size:12px;color:var(--mt);margin-top:4px}
.ex-muscle-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.ex-notes{background:var(--ac10);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.6;border-left:3px solid var(--ac)}.ex-notes b{color:var(--tx)}
.coaching-item{display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:11px;color:var(--t2)}
.sets-header{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;margin-bottom:6px}
.sets-header span{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.set-row{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:5px}
.set-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.set-done{background:var(--ok10);color:var(--ok)}.set-empty{background:var(--bg);color:var(--mt)}
.timer{background:var(--cd2);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;border:1px solid var(--bd);margin-top:12px}
.timer.done{border:2px solid var(--ok);background:var(--ok10)}
.timer-circle{position:relative;width:52px;height:52px;flex-shrink:0}
.timer-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:monospace}
.tbtn{border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.tbtn-go{background:var(--ok);color:#fff}.tbtn-pause{background:var(--ac);color:#fff}.tbtn-reset{background:none;color:var(--t2);border:1px solid var(--bd)}
.pr-line{margin-top:10px;font-size:11px;color:var(--mt);text-align:center;padding:8px;background:var(--cd2);border-radius:8px}
.ex-nav{display:flex;gap:8px;margin-top:16px}.ex-nav>*{flex:1}
.wu-card{border-bottom:1px solid var(--bd);padding:12px 0}
.wu-card:last-child{border-bottom:none}
.wu-top{display:flex;gap:12px;align-items:flex-start}
.wu-img{width:70px;height:70px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid var(--bd);background:var(--cd2)}
.wu-img img{width:100%;height:100%;object-fit:cover}
.wu-links{display:flex;gap:6px;margin-top:6px}
.wu-links a{font-size:9px;text-decoration:none;padding:3px 8px;border-radius:6px;font-weight:600}
.wod-move{padding:8px 0;font-size:13px;display:flex;align-items:center;gap:8px}.wod-move+.wod-move{border-top:1px solid var(--bd)}
.wod-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-exos{display:flex;flex-wrap:wrap;gap:4px}
.hist-exo{background:var(--bg);border-radius:8px;padding:4px 8px;font-size:10px;color:var(--t2)}.hist-exo b{color:var(--tx)}
.hist-detail{margin-top:8px;font-size:10px;color:var(--mt);display:none}
.hist-detail.open{display:block}
.hist-toggle{font-size:10px;color:var(--ac);cursor:pointer;margin-top:4px;background:none;border:none;font-family:inherit;text-decoration:underline}
.phase-badge{display:inline-block;font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}
</style>
</head>

let S={view:"home",hist:[],sess:null,ei:-1,log:{},notes:"",t0:null,phase:0};
const SK="apex-fit-v6";
async function loadS(){try{const d=JSON.parse(localStorage.getItem(SK));if(d){if(d.history)S.hist=d.history;if(d.phase!==undefined)S.phase=d.phase;}}catch{}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify({history:S.hist,phase:S.phase}));}catch{}}

// ═══ CSV EXPORT ═══
function exportCSV(){
  let csv="Date;Session;Durée (min);Exercice;Set;Kg;Reps;Volume;Notes\n";
  S.hist.forEach(h=>{
    h.exercises.forEach(ex=>{
      const sets=Object.entries(ex.logged||{});
      if(sets.length===0){csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.duration};${ex.name};;;;;\n`;}
      else{sets.forEach(([si,s])=>{csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.duration};${ex.name};${parseInt(si)+1};${s.weight};${s.reps};${(s.weight||0)*(s.reps||0)};${h.notes||""}\n`;});}
    });
  });
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`apex-fitness-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

  if(S.view!=="session")h+=`<div class="nav">${[{id:"home",l:"Accueil",i:'<path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/>'},{id:"history",l:"Historique",i:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>'},{id:"settings",l:"Réglages",i:'<circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>'}].map(x=>`<button class="nav-btn ${S.view===x.id?'active':''}" onclick="nav('${x.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${x.i}</svg>${x.l}</button>`).join("")}</div>`;

}

function rSession(){
  const s=S.sess;if(!s)return"";
  const ei=S.ei,ex=ei>=0&&ei<s.exercises.length?s.exercises[ei]:null;
  const isW=ei===-1,isWod=ei===s.exercises.length;
  const pct=((ei+2)/(s.exercises.length+2)*100).toFixed(0);
  const elapsed=S.t0?Math.round((Date.now()-S.t0)/6e4):0;

    const coachHtml=ex.coaching?`<div style="margin-bottom:14px">${ex.coaching.map(c=>`<div class="coaching-item"><span style="color:var(--ok);flex-shrink:0;font-weight:700">✦</span>${c}</div>`).join("")}</div>`:"";
    let setsH=`<div class="sets-header"><span>Set</span><span>Kg</span><span>Reps</span><span></span></div>`;

  }
  return`<div style="padding:12px 16px;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:center"><button class="btn2" style="padding:5px 10px;font-size:11px" onclick="if(confirm('Quitter ?'))nav('home')">←</button><div style="font-size:18px;font-weight:900;letter-spacing:3px;color:${s.color}">${s.name}</div><div style="font-size:11px;color:var(--mt)">${elapsed}min</div></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${s.color}"></div></div></div><div class="pills">${pills}</div>${content}`;
}

function rHist(){
  if(!S.hist.length)return`<div class="hdr"><div class="logo">HISTORIQUE</div></div><div class="card" style="text-align:center;color:var(--mt);padding:30px">Aucune séance 💪</div>`;

  <div style="padding:0 14px 8px"><button class="btn2" style="width:100%" onclick="exportCSV()">📊 Exporter en CSV (Excel)</button></div>`+
  S.hist.map((h,hi)=>{const col=PROG.sessions.find(s=>s.id===h.sessionId)?.color||"var(--ac)";
    const detailId="det_"+hi;
    const details=h.exercises.map(x=>{const sets=Object.entries(x.logged||{});return sets.length?sets.map(([si,s])=>`<div style="display:grid;grid-template-columns:1fr 40px 40px 50px;gap:4px;font-size:10px;padding:2px 0"><span>${x.name}</span><span>${s.weight}kg</span><span>${s.reps}r</span><span style="color:var(--mt)">${(s.weight||0)*(s.reps||0)}</span></div>`).join(""):`<div style="font-size:10px;padding:2px 0;color:var(--mt)">${x.name}: non tracké</div>`;}).join("");

function nav(v){S.view=v;tStop();R();}
function goSess(id){S.sess=PROG.sessions.find(s=>s.id===id);S.ei=-1;S.log={};S.notes="";S.t0=Date.now();S.view="session";R();}
function setEi(i){S.ei=i;tStop();R();}
function setPhase(i){S.phase=i;saveS();R();}
function logSet(eid,si,w,r){if(!S.log[eid])S.log[eid]={};const p=S.log[eid][si]||{};S.log[eid][si]={weight:w!==null?(parseFloat(w)||0):p.weight||0,reps:r!==null?(parseInt(r)||0):p.reps||0};R();}
function finish(){const s=S.sess;const ph=PHASES[S.phase];S.hist.unshift({id:""+Date.now(),sessionId:s.id,sessionName:s.name,phase:ph.name,date:new Date().toISOString(),duration:Math.round((Date.now()-S.t0)/6e4),exercises:s.exercises.map(x=>({id:x.id,name:x.name,sets:x.sets,reps:x.reps,muscle:x.muscle,logged:S.log[x.id]||{}})),notes:S.notes});saveS();S.view="home";S.sess=null;R();}

// ═══ TIMER ═══
let _ti=null,_ts=0,_tt=0,_td="down";
function tStop(){if(_ti){clearInterval(_ti);_ti=null;}}
function tToggle(total,dir){_td=dir||"down";if(_ti){tStop();const b=document.getElementById("tbtn");if(b){b.textContent="Start";b.className="tbtn tbtn-go";}return;}_tt=total;if(_td==="down"&&_ts===0)_ts=total;const b=document.getElementById("tbtn");if(b){b.textContent="Pause";b.className="tbtn tbtn-pause";}_ti=setInterval(()=>{_td==="down"?_ts--:_ts++;if((_td==="down"&&_ts<=0)||(_td!=="down"&&_ts>=_tt)){_ts=_td==="down"?0:_tt;tStop();tUI(true);return;}tUI(false);},1000);}
function tReset(total,dir){tStop();_td=dir||"down";_ts=_td==="down"?total:0;_tt=total;tUI(false);const b=document.getElementById("tbtn");if(b){b.textContent="Start";b.className="tbtn tbtn-go";}}
function tUI(done){const d=document.getElementById("tdisp"),r=document.getElementById("tring"),bx=document.getElementById("timerbox"),b=document.getElementById("tbtn");if(!d)return;d.textContent=`${Math.floor(_ts/60)}:${String(_ts%60).padStart(2,"0")}`;if(r){const c=2*Math.PI*22;const p=_td==="down"?(_tt-_ts)/_tt:_ts/_tt;r.style.strokeDashoffset=c*(1-p);if(done)r.setAttribute("stroke","var(--ok)");}if(done&&bx)bx.classList.add("done");if(done&&b){b.textContent="✓ Fini";b.className="tbtn tbtn-go";}}

function doExport(){const j=JSON.stringify({history:S.hist,phase:S.phase,exported:new Date().toISOString()},null,2);document.getElementById("ioArea").innerHTML=`<textarea class="inp" style="margin-top:10px;min-height:80px;font-size:9px" onclick="this.select()" readonly>${j}</textarea><div style="font-size:10px;color:var(--mt);margin-top:4px">Copie ce JSON</div>`;}
function doShowImport(){document.getElementById("ioArea").innerHTML=`<textarea class="inp" id="impTxt" style="margin-top:10px;min-height:60px;font-size:9px" placeholder="Colle ton JSON..."></textarea><button class="btn" style="margin-top:8px" onclick="doImport()">Importer</button>`;}
function doImport(){try{const d=JSON.parse(document.getElementById("impTxt").value);if(d.history){S.hist=d.history;if(d.phase!==undefined)S.phase=d.phase;saveS();R();}}catch{alert("JSON invalide");}}

// ═══ INIT ═══
loadS();R();
</script>
