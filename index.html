<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>APEX Fitness</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E63946">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--cd:#14141f;--cd2:#1a1a2a;--bd:#2a2a3a;--tx:#e8e8f0;--t2:#9898a8;--mt:#5a5a6a;--ac:#E63946;--ok:#2A9D8F;--wa:#F4A261;--ac10:rgba(230,57,70,.12);--ok10:rgba(42,157,143,.12);--wa10:rgba(244,162,97,.12)}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:75px;-webkit-tap-highlight-color:transparent}
.hdr{padding:18px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:900;letter-spacing:5px;color:var(--ac)}
.stats-row{display:flex;gap:6px;padding:0 14px;margin-bottom:14px}
.stat-box{flex:1;background:var(--cd);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--bd)}
.stat-val{font-size:22px;font-weight:900}.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-top:2px}
.sec-title{padding:0 14px 8px;font-size:13px;font-weight:800;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.card{background:var(--cd);border-radius:14px;border:1px solid var(--bd);padding:16px;margin:0 14px 10px}
.sess-card{cursor:pointer;border-left:4px solid var(--ac)}.sess-card:active{background:var(--cd2)}
.sess-inner{display:flex;justify-content:space-between;align-items:center}
.sess-name{font-size:20px;font-weight:900;letter-spacing:3px}
.sess-meta{font-size:11px;color:var(--mt);margin-top:4px}
.sess-muscles{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.muscle-tag{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--cd);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
.nav-btn{background:none;border:none;color:var(--mt);font-size:9px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 14px;font-family:inherit}
.nav-btn.active{color:var(--ac);font-weight:700}.nav-btn svg{width:20px;height:20px}
.btn{background:var(--ac);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}.btn:active{opacity:.8}
.btn-ok{background:var(--ok)}.btn2{background:none;color:var(--t2);border:1px solid var(--bd);border-radius:10px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.inp{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:14px;width:100%;box-sizing:border-box;font-family:monospace;outline:none}
.inp:focus{border-color:var(--ac)}textarea.inp{resize:vertical;min-height:50px;font-family:inherit}
.prog-bar{background:var(--bd);border-radius:4px;height:4px;margin-top:8px}.prog-fill{height:4px;border-radius:4px;transition:width .3s}
.pills{display:flex;gap:5px;padding:10px 14px;overflow-x:auto}
.pill{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}.pill.active{color:#fff;border-color:transparent}
.ex-imgs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding:4px 0}
.ex-img-wrap{flex-shrink:0;width:130px;height:130px;border-radius:12px;overflow:hidden;border:1px solid var(--bd);background:var(--cd2);position:relative}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover}
.ex-img-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:8px;text-align:center;padding:2px;font-weight:600}
.link-row{display:flex;gap:8px;margin-bottom:14px}
.ex-link{flex:1;display:flex;align-items:center;gap:6px;background:var(--cd2);border:1px solid var(--bd);border-radius:10px;padding:8px 10px;text-decoration:none;color:var(--tx);font-size:10px;font-weight:600}
.ex-link svg{width:20px;height:20px;flex-shrink:0}
.ex-name{font-size:17px;font-weight:800}.ex-sets-info{font-size:12px;color:var(--mt);margin-top:4px}
.ex-muscle-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600;margin-top:6px;text-transform:uppercase}
.ex-notes{background:var(--ac10);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.6;border-left:3px solid var(--ac)}.ex-notes b{color:var(--tx)}
.sets-header{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;margin-bottom:6px}
.sets-header span{font-size:9px;color:var(--mt);text-transform:uppercase;font-weight:600}
.set-row{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:5px}
.set-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.set-done{background:var(--ok10);color:var(--ok)}.set-empty{background:var(--bg);color:var(--mt)}
.timer{background:var(--cd2);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;border:1px solid var(--bd);margin-top:12px}
.timer.done{border:2px solid var(--ok);background:var(--ok10)}
.timer-circle{position:relative;width:52px;height:52px;flex-shrink:0}
.timer-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:monospace}
.tbtn{border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.tbtn-go{background:var(--ok);color:#fff}.tbtn-pause{background:var(--ac);color:#fff}.tbtn-reset{background:none;color:var(--t2);border:1px solid var(--bd)}
.pr-line{margin-top:10px;font-size:11px;color:var(--mt);text-align:center;padding:8px;background:var(--cd2);border-radius:8px}
.suggest-line{margin-top:8px;font-size:11px;text-align:center;padding:8px;background:rgba(69,123,157,.12);border-radius:8px;color:#457B9D;font-weight:600}
.ex-nav{display:flex;gap:8px;margin-top:16px}.ex-nav>*{flex:1}
.wu-card{border-bottom:1px solid var(--bd);padding:12px 0}.wu-card:last-child{border-bottom:none}
.wu-top{display:flex;gap:12px;align-items:flex-start}
.wu-img{width:65px;height:65px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid var(--bd);background:var(--cd2)}
.wu-img img{width:100%;height:100%;object-fit:cover}
.wu-links{display:flex;gap:6px;margin-top:6px}
.wu-links a{font-size:9px;text-decoration:none;padding:3px 8px;border-radius:6px;font-weight:600}
.wod-move{padding:8px 0;font-size:13px;display:flex;align-items:center;gap:10px}.wod-move+.wod-move{border-top:1px solid var(--bd)}
.wod-img{width:40px;height:40px;border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:var(--cd2);flex-shrink:0}
.wod-img img{width:100%;height:100%;object-fit:cover}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-exos{display:flex;flex-wrap:wrap;gap:4px}
.hist-exo{background:var(--bg);border-radius:8px;padding:4px 8px;font-size:10px;color:var(--t2)}.hist-exo b{color:var(--tx)}
.hist-detail{margin-top:8px;font-size:10px;color:var(--mt);display:none}.hist-detail.open{display:block}
.hist-toggle{font-size:10px;color:var(--ac);cursor:pointer;margin-top:4px;background:none;border:none;font-family:inherit;text-decoration:underline}
.phase-badge{display:inline-block;font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;margin-left:8px}
.fatigue-bar{height:8px;border-radius:4px;margin-top:6px;transition:width .3s}
.score-card{display:flex;gap:8px;margin-bottom:14px;padding:0 14px}
.score-item{flex:1;background:var(--cd);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--bd)}
.score-val{font-size:18px;font-weight:900}.score-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);margin-top:2px}
.l5-alert{background:rgba(244,162,97,.12);border:1px solid var(--wa);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--wa);margin-bottom:12px;display:flex;align-items:center;gap:8px}
</style>
</head>

let audioCtx;
// Build a robust "Wiki" link as a Google search — avoids 404 on MuscleWiki slug mismatches
function wk(n){return"https://www.google.com/search?q="+encodeURIComponent("musclewiki "+(n||"").replace(/^\d+[-\s]?(\d+[-\s]?)*/,"").replace(/\(.*?\)/g,"").trim());}
function beep(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();[0,.2,.4].forEach(d=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=880;g.gain.value=.3;o.start(audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d+.15);});}catch{}}

// ═══ TIMER (Date.now based) ═══
let T={on:false,at:0,total:0,dir:"down",rem:0,done:false},tRAF;
function tGet(){if(!T.on)return T.rem;const e=Math.floor((Date.now()-T.at)/1000);return T.dir==="down"?Math.max(0,T.rem-e):Math.min(T.total,e+T.rem);}
function tTick(){const r=tGet(),p=T.dir==="down"?(T.total-r)/T.total:r/T.total;const d=document.getElementById("tdisp"),rng=document.getElementById("tring"),bx=document.getElementById("timerbox");if(d)d.textContent=`${Math.floor(r/60)}:${String(r%60).padStart(2,"0")}`;if(rng){rng.style.strokeDashoffset=2*Math.PI*22*(1-p);rng.style.transition="stroke-dashoffset .3s";}if((T.dir==="down"&&r<=0)||(T.dir!=="down"&&r>=T.total)){T.on=false;T.done=true;if(rng)rng.setAttribute("stroke","var(--ok)");if(bx)bx.classList.add("done");const b=document.getElementById("tbtn");if(b){b.textContent="✓";b.className="tbtn tbtn-go";}beep();cancelAnimationFrame(tRAF);return;}tRAF=requestAnimationFrame(tTick);}
function tToggle(tot,dir){dir=dir||"down";if(T.done||T.total!==tot||T.dir!==dir){cancelAnimationFrame(tRAF);T={on:false,at:0,total:tot,dir:dir,rem:dir==="up"?0:tot,done:false};const bx=document.getElementById("timerbox");if(bx)bx.classList.remove("done");}S._timerExIdx=S.ei;T.dir=dir;T.total=tot;if(T.on){T.on=false;T.rem=tGet();cancelAnimationFrame(tRAF);const b=document.getElementById("tbtn");if(b){b.textContent="Start";b.className="tbtn tbtn-go";}}else{if(!T.at&&T.rem===0)T.rem=T.dir==="down"?tot:0;T.at=Date.now();T.on=true;const b=document.getElementById("tbtn");if(b){b.textContent="Pause";b.className="tbtn tbtn-pause";}tTick();}}
function tReset(tot,dir){cancelAnimationFrame(tRAF);T={on:false,at:0,total:tot,dir:dir||"down",rem:dir==="up"?0:tot,done:false};const d=document.getElementById("tdisp"),rng=document.getElementById("tring"),bx=document.getElementById("timerbox"),b=document.getElementById("tbtn");if(d)d.textContent=`${Math.floor(T.rem/60)}:${String(T.rem%60).padStart(2,"0")}`;if(rng){rng.style.strokeDashoffset=2*Math.PI*22;}if(bx)bx.classList.remove("done");if(b){b.textContent="Start";b.className="tbtn tbtn-go";}}
function tStop(){cancelAnimationFrame(tRAF);T={on:false,at:0,total:0,dir:"down",rem:0,done:false};}

// ═══ SMART FEATURES ═══
// 1RM: Average of Epley + Brzycki for ≤10 reps (DiStasio 2014: ±2.7kg accuracy)
// Mayhew for >10 reps (better at high rep ranges per research)
function calc1RM(w, r) {
  if (!w || !r || r <= 0) return 0;
  if (r === 1) return w;
  if (r <= 10) {
    const epley = w * (1 + r / 30);
    const brzycki = w / (1.0278 - 0.0278 * r);
    return Math.round((epley + brzycki) / 2);
  }
  // Mayhew formula for >10 reps
  return Math.round(w / (0.522 + 0.419 * Math.exp(-0.055 * r)));
}

// ═══ APRE-BASED AUTO-PROGRESSION (scientifically validated) ═══
// APRE adjustment table (Mann et al.) adapted for app use
// Based on: Huang et al. 2025 meta-analysis — APRE ranked #1 (SUCRA 93%)
function getAPREAdjustment(repsPerformed, targetRM) {
  // APRE 6 table (base strength - most common)
  if (targetRM <= 6) {
    if (repsPerformed <= 2) return { setAdj: -5, nextAdj: -5, status: "trop lourd" };
    if (repsPerformed <= 4) return { setAdj: -2.5, nextAdj: 0, status: "lourd" };
    if (repsPerformed <= 7) return { setAdj: 0, nextAdj: 0, status: "optimal" };
    if (repsPerformed <= 12) return { setAdj: 2.5, nextAdj: 2.5, status: "progression" };
    return { setAdj: 5, nextAdj: 5, status: "trop léger" };
  }
  // APRE 10 table (hypertrophy)
  if (targetRM <= 12) {
    if (repsPerformed <= 6) return { setAdj: -5, nextAdj: -5, status: "trop lourd" };
    if (repsPerformed <= 8) return { setAdj: -2.5, nextAdj: 0, status: "lourd" };
    if (repsPerformed <= 12) return { setAdj: 0, nextAdj: 0, status: "optimal" };
    if (repsPerformed <= 16) return { setAdj: 2.5, nextAdj: 2.5, status: "progression" };
    return { setAdj: 5, nextAdj: 5, status: "trop léger" };
  }
  // APRE 3 / deload (high rep)
  if (repsPerformed <= 12) return { setAdj: -2.5, nextAdj: 0, status: "lourd" };
  if (repsPerformed <= 20) return { setAdj: 0, nextAdj: 0, status: "optimal" };
  return { setAdj: 2.5, nextAdj: 2.5, status: "trop léger" };
}

function getSuggestion(exName) {
  const entries = S.hist.filter(h => h.exercises.some(e => e.name === exName)).slice(0, 3);
  if (!entries.length) return null;
  const lastEntry = entries[0];
  const lastEx = lastEntry.exercises.find(e => e.name === exName);
  const sets = Object.values(lastEx.logged || {});
  if (!sets.length) return null;

  // Get last working weight and max reps at that weight
  const maxWeight = Math.max(...sets.map(s => s.weight || 0));
  const repsAtMax = sets.filter(s => s.weight === maxWeight).map(s => s.reps || 0);
  const bestReps = Math.max(...repsAtMax);
  const ph = PHASES[S.phase];
  const targetRM = parseInt(ph.reps.split("-")[1]) || 8;
  const adj = getAPREAdjustment(bestReps, targetRM);
  const sugWeight = Math.round((maxWeight + adj.nextAdj) / 2.5) * 2.5;

  // RIR from last session if available
  const lastRIR = lastEx.rir;
  let rirNote = "";
  if (lastRIR !== undefined && lastRIR !== null) {
    if (lastRIR <= 1) rirNote = " | RIR≤1: proche du max";
    else if (lastRIR >= 3) rirNote = " | RIR≥3: marge dispo";
  }

  const icons = { "trop lourd": "🔴", "lourd": "🟠", "optimal": "🟢", "progression": "🔵", "trop léger": "⚪" };
  return {
    weight: sugWeight,
    reason: `${icons[adj.status]} APRE: ${maxWeight}kg × ${bestReps}r → ${adj.status} → ${sugWeight}kg${rirNote}`,
    status: adj.status
  };
}

// Best 1RM for an exercise
function get1RM(exName){
  let best=0;
  S.hist.forEach(h=>{h.exercises.filter(e=>e.name===exName).forEach(ex=>{Object.values(ex.logged||{}).forEach(s=>{if(s.weight&&s.reps){const rm=calc1RM(s.weight,s.reps);if(rm>best)best=rm;}});});});
  return best;
}

// Fatigue score: volume last 7 days vs average
function getFatigue(){
  if(S.hist.length<4)return{score:50,label:"Données insuffisantes",color:"var(--mt)"};
  const now=Date.now();
  let vol7=0,volAll=0,weeks=0;
  const weekMap={};
  S.hist.forEach(h=>{
    const d=new Date(h.date),diff=now-d.getTime();
    let v=0;h.exercises.forEach(x=>Object.values(x.logged||{}).forEach(s=>{v+=(s.weight||0)*(s.reps||0);}));
    if(diff<6048e5)vol7+=v;
    const wk=Math.floor(diff/6048e5);if(!weekMap[wk])weekMap[wk]=0;weekMap[wk]+=v;
  });
  const wkVals=Object.values(weekMap);
  const avg=wkVals.length?wkVals.reduce((a,b)=>a+b,0)/wkVals.length:1;
  const ratio=avg>0?vol7/avg:1;
  const score=Math.min(100,Math.round(ratio*50));
  if(score>75)return{score,label:"⚠️ Surcharge — envisage un deload",color:"var(--ac)"};
  if(score>55)return{score,label:"Bon rythme — continue !",color:"var(--ok)"};
  return{score,label:"Volume faible — tu peux pousser",color:"#457B9D"};
}

// Rest day intelligence: which session to do today
function getRecommendation(){
  const sessIds=["push","pull","legs"];
  const last={};
  sessIds.forEach(id=>{const h=S.hist.find(x=>x.sessionId===id);last[id]=h?new Date(h.date).getTime():0;});
  // Sort by least recently done
  const sorted=sessIds.sort((a,b)=>last[a]-last[b]);
  const rec=sorted[0];
  const daysSince=last[rec]?Math.floor((Date.now()-last[rec])/864e5):99;
  return{id:rec,days:daysSince};
}

// Pick WOD (least recently used)
function pickWOD(sessId){
  const pool=WODS[sessId];if(!pool||!pool.length)return pool?pool[0]:null;
  // Find which WOD names were used recently
  const used={};
  S.hist.filter(h=>h.sessionId===sessId).forEach(h=>{if(h.wodName&&!used[h.wodName])used[h.wodName]=h.date;});
  // Sort pool by least recently used
  const sorted=[...pool].sort((a,b)=>{
    const da=used[a.name]?new Date(used[a.name]).getTime():0;
    const db=used[b.name]?new Date(used[b.name]).getTime():0;
    return da-db;
  });
  return sorted[0];
}

// ─── ACCESSORY ROTATION (LRU, même logique que WODs) ───
// Helms/RTS : accessories tournent toutes les 2-4 sessions → stimulus neuf = progression
function pickPoolExercise(pool){
  if(!pool||!pool.length)return pool?.[0]||null;
  const used={};
  S.hist.forEach(h=>{h.exercises.forEach(ex=>{if(pool.some(p=>p.name===ex.name)&&!used[ex.name])used[ex.name]=h.date;});});
  return [...pool].sort((a,b)=>{
    const da=used[a.name]?new Date(used[a.name]).getTime():0;
    const db=used[b.name]?new Date(used[b.name]).getTime():0;
    return da-db;
  })[0];
}
function buildSession(sessId,savedExercises){
  const base=PROG.sessions.find(s=>s.id===sessId);if(!base)return null;
  const sess=Object.assign({},base);
  if(savedExercises&&savedExercises.length){
    // Restore session in-progress: récupère les exos sauvegardés dans le state actif
    const allEx=[...base.compounds,...base.pools.flatMap(p=>p.exercises)];
    const restored=savedExercises.map(sv=>allEx.find(e=>e.id===sv.id)||sv).filter(Boolean);
    sess.exercises=restored.length?restored:[...base.compounds,...base.pools.map(p=>pickPoolExercise(p.exercises))].filter(Boolean);
  }else{
    // Nouvelle séance : pick LRU dans chaque pool
    sess.exercises=[...base.compounds,...base.pools.map(p=>pickPoolExercise(p.exercises))].filter(Boolean);
  }
  return sess;
}

function exportCSV(){
  let csv="Date;Session;Phase;Durée;Exercice;Muscle;Set;Kg;Reps;Volume;1RM est.;RIR;Notes\n";
  S.hist.forEach(h=>{h.exercises.forEach(ex=>{const sets=Object.entries(ex.logged||{});if(!sets.length)csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.phase||""};${h.duration};${ex.name};${ex.muscle};;;;;;;\n`;else sets.forEach(([si,s])=>{const rm=s.weight&&s.reps?calc1RM(s.weight,s.reps):0;csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.phase||""};${h.duration};${ex.name};${ex.muscle};${parseInt(si)+1};${s.weight};${s.reps};${(s.weight||0)*(s.reps||0)};${rm};${ex.rir!==undefined&&ex.rir!==null?ex.rir:""};${(h.notes||"").replace(/;/g,",")}\n`;});});});
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`apex-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ═══ CHARTS (SVG) ═══
function svgBar(data,lk,vk,col,w,h){
  if(!data.length)return'<div style="text-align:center;color:var(--mt);padding:16px;font-size:11px">—</div>';
  const mx=Math.max(...data.map(d=>d[vk]))||1;const bW=Math.min(28,Math.floor((w-40)/data.length)-3);const cH=h-25;
  let s=`<svg width="100%" viewBox="0 0 ${w} ${h}"><line x1="28" y1="0" x2="28" y2="${cH}" stroke="var(--bd)"/><line x1="28" y1="${cH}" x2="${w}" y2="${cH}" stroke="var(--bd)"/><text x="25" y="10" text-anchor="end" font-size="7" fill="var(--mt)">${mx}</text>`;
  data.forEach((d,i)=>{const bh=Math.max(2,(d[vk]/mx)*cH);const x=30+i*(bW+3);s+=`<rect x="${x}" y="${cH-bh}" width="${bW}" height="${bh}" rx="2" fill="${col}" opacity=".8"><title>${d[lk]}: ${d[vk]}</title></rect>`;if(data.length<=10)s+=`<text x="${x+bW/2}" y="${cH+11}" text-anchor="middle" font-size="7" fill="var(--mt)">${d[lk]}</text>`;});
  return s+"</svg>";
}
function svgLine(data,lk,vk,col,w,h){
  if(data.length<2)return svgBar(data,lk,vk,col,w,h);
  const mx=Math.max(...data.map(d=>d[vk]))||1;const cH=h-25;const cW=w-40;const step=cW/(data.length-1);
  let pts="",dots="",lbls="",s=`<svg width="100%" viewBox="0 0 ${w} ${h}"><line x1="28" y1="0" x2="28" y2="${cH}" stroke="var(--bd)"/><line x1="28" y1="${cH}" x2="${w}" y2="${cH}" stroke="var(--bd)"/><text x="25" y="10" text-anchor="end" font-size="7" fill="var(--mt)">${mx}</text>`;
  data.forEach((d,i)=>{const x=30+i*step,y=cH-(d[vk]/mx)*cH;pts+=(i?` L`:`M`)+`${x},${y}`;dots+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${col}"><title>${d[lk]}: ${d[vk]}kg</title></circle>`;if(data.length<=10)lbls+=`<text x="${x}" y="${cH+12}" text-anchor="middle" font-size="7" fill="var(--mt)">${d[lk]}</text>`;});
  return s+`<path d="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>`+dots+lbls+"</svg>";
}

    const coach=ex.coaching?`<div style="margin-bottom:12px">${ex.coaching.map(c=>`<div style="display:flex;gap:6px;padding:3px 0;font-size:11px;color:var(--t2)"><span style="color:var(--ok);font-weight:700">✦</span>${c}</div>`).join("")}</div>`:"";

    let pr="";const prev=S.hist.find(h=>h.exercises.some(e=>e.name===ex.name));if(prev){const pe=prev.exercises.find(e=>e.name===ex.name);const b=Math.max(0,...Object.values(pe.logged||{}).map(s=>s.weight||0));if(b>0)pr=`<div class="pr-line">📊 Record: <b>${b}kg</b> — ${new Date(prev.date).toLocaleDateString("fr-FR")}</div>`;}
    content=`<div class="card" style="padding:20px">
      <div style="margin-bottom:14px"><div class="ex-name">${ex.name}<span class="phase-badge" style="background:${ph.color}22;color:${ph.color}">${ph.name} ${ph.reps}</span></div><div class="ex-sets-info">${nSets}×${ph.reps} — Repos ${rest}s</div><div class="ex-muscle-badge" style="background:${mc}22;color:${mc}">${MN[ex.muscle]}</div></div>

      <div class="timer" id="timerbox"><div class="timer-circle"><svg viewBox="0 0 52 52" style="transform:rotate(-90deg)"><circle cx="26" cy="26" r="22" fill="none" stroke="var(--bd)" stroke-width="3"/><circle id="tring" cx="26" cy="26" r="22" fill="none" stroke="${mc}" stroke-width="3" stroke-dasharray="${2*Math.PI*22}" stroke-dashoffset="${2*Math.PI*22}" stroke-linecap="round"/></svg><div class="timer-time" id="tdisp">${Math.floor(rest/60)}:${String(rest%60).padStart(2,"0")}</div></div><div style="flex:1"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:5px;font-weight:600">⏱ ${rest}s</div><div style="display:flex;gap:6px"><button class="tbtn tbtn-go" id="tbtn" onclick="tToggle(${rest})">Start</button><button class="tbtn tbtn-reset" onclick="tReset(${rest})">Reset</button></div></div></div>

function rHist(){
  const names=[];S.hist.forEach(h=>h.exercises.forEach(e=>{if(Object.keys(e.logged||{}).length&&!names.includes(e.name))names.push(e.name);}));
  // Weekly volume data
  const wv={};S.hist.forEach(h=>{const d=new Date(h.date),ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+1);const k=ws.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});if(!wv[k])wv[k]={s:k,v:0};h.exercises.forEach(x=>Object.values(x.logged||{}).forEach(s=>{wv[k].v+=((s.weight||0)*(s.reps||0));}));});
  const wvData=Object.values(wv).slice(-10);
  // Exercise progress data
  const getExProg=(n)=>S.hist.filter(h=>h.exercises.some(e=>e.name===n)).reverse().map(h=>{const x=h.exercises.find(e=>e.name===n);const sets=Object.values(x.logged||{});return{d:new Date(h.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}),kg:sets.length?Math.max(...sets.map(s=>s.weight||0)):0};}).slice(-10);

  let charts="";
  if(wvData.length>1)charts+=`<div class="card"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600;margin-bottom:8px">Volume hebdo (kg×reps)</div>${svgBar(wvData,"s","v","#E63946",300,120)}</div>`;
  if(names.length)charts+=`<div class="card"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600;margin-bottom:8px">Poids max par exercice</div><select class="inp" style="margin-bottom:8px" onchange="document.getElementById('exC').innerHTML=getExChartHTML(this.value)">${names.map(n=>`<option>${n}</option>`).join("")}</select><div id="exC">${svgLine(getExProg(names[0]),"d","kg","#457B9D",300,120)}</div></div>`;

  if(!S.hist.length)return`<div class="hdr"><div class="logo">HISTORIQUE</div></div>${charts}<div class="card" style="text-align:center;color:var(--mt);padding:30px">Aucune séance 💪</div>`;
  return`<div class="hdr"><div class="logo">HISTORIQUE</div></div><div style="padding:0 14px 8px"><button class="btn2" style="width:100%" onclick="exportCSV()">📊 CSV (Excel)</button></div>${charts}`+
  S.hist.map((h,hi)=>{const col=h.sessionId==='cardio'?'#06b6d4':(PROG.sessions.find(s=>s.id===h.sessionId)?.color||"var(--ac)");const di="d"+hi;
    if(h.cardio){const c=h.cardio,ic=c.mode==='run'?'🏃':c.mode==='swim'?'🏊':'🚴';const stats=c.mode==='run'?`${c.duration}min · ${c.speed}km/h · ${c.incline}% pente`:c.mode==='swim'?`${c.distance}m · ${c.duration}min`:`${c.duration}min · ${c.incline}% · rés.${c.resistance}`;return`<div class="card"><div class="hist-top"><div style="font-size:14px;font-weight:900;letter-spacing:2px;color:${col}">${ic} ${h.sessionName}</div><div style="font-size:10px;color:var(--mt)">${new Date(h.date).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})} • ${h.duration}min</div></div><div style="font-size:11px;color:var(--t2);margin-top:4px">${stats}</div>${h.notes?`<div style="font-size:11px;color:var(--mt);margin-top:5px;font-style:italic">"${h.notes}"</div>`:''}</div>`;}
    const det=h.exercises.map(x=>{const sets=Object.entries(x.logged||{});return sets.length?sets.map(([si,s])=>`<div style="display:grid;grid-template-columns:1fr 38px 38px 45px;gap:3px;font-size:10px;padding:2px 0"><span>${x.name}</span><span>${s.weight}kg</span><span>${s.reps}r</span><span style="color:var(--mt)">${(s.weight||0)*(s.reps||0)}</span></div>`).join(""):`<div style="font-size:10px;color:var(--mt)">${x.name}: —</div>`;}).join("");
    return`<div class="card"><div class="hist-top"><div style="font-size:14px;font-weight:900;letter-spacing:2px;color:${col}">${h.sessionName}${h.phase?`<span class="phase-badge" style="background:var(--cd2);color:var(--t2)">${h.phase}</span>`:''}</div><div style="font-size:10px;color:var(--mt)">${new Date(h.date).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})} • ${h.duration}min</div></div>${h.wodName?`<div style="font-size:10px;color:var(--wa);margin-bottom:4px">WOD: ${h.wodName}</div>`:''}<div class="hist-exos">${h.exercises.map(x=>{const b=Math.max(0,...Object.values(x.logged||{}).map(s=>s.weight||0));return`<div class="hist-exo">${x.name}: <b>${b}kg</b></div>`;}).join("")}</div>${h.notes?`<div style="font-size:11px;color:var(--mt);margin-top:5px;font-style:italic">"${h.notes}"</div>`:''}<button class="hist-toggle" onclick="const d=document.getElementById('${di}');d.classList.toggle('open');this.textContent=d.classList.contains('open')?'Masquer':'Détails'">Détails</button><div class="hist-detail" id="${di}">${det}</div></div>`;}).join("");
}

  <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Données</div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn2" onclick="exportCSV()">📊 CSV (Excel)</button><button class="btn2" onclick="doExp()">📤 JSON backup</button><button class="btn2" onclick="doImpUI()">📥 Importer</button>${S.hist.length?`<button class="btn2" style="color:var(--ac);border-color:var(--ac)" onclick="if(confirm('Supprimer ?')){S.hist=[];saveS();R();}">🗑 Effacer</button>`:""}</div><div id="io"></div></div>

// ═══ CARDIO ═══
function setCardio(k,v){S.cardio[k]=v;saveA();}
function setCardioMode(m){S.cardio.mode=m;R();}
function rCardio(){
  const c=S.cardio,el=Date.now()-(S._cardioT0||Date.now());
  const modes=[{id:"run",l:"Course",ic:"🏃"},{id:"swim",l:"Nage",ic:"🏊"},{id:"bike",l:"Vélo",ic:"🚴"}];
  const modeTabs=modes.map(m=>`<button onclick="setCardioMode('${m.id}')" style="flex:1;padding:12px 8px;border-radius:10px;border:2px solid ${c.mode===m.id?'#06b6d4':'var(--bd)'};background:${c.mode===m.id?'rgba(6,182,212,.15)':'none'};color:${c.mode===m.id?'#06b6d4':'var(--t2)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${m.ic} ${m.l}</button>`).join("");
  const fieldRow=(lbl,k,v,unit,step,min,max)=>`<div style="margin-bottom:14px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600;margin-bottom:4px">${lbl}${unit?` (${unit})`:""}</div><input class="inp" type="number" step="${step||1}" min="${min||0}"${max?` max="${max}"`:""} value="${v}" onchange="setCardio('${k}',parseFloat(this.value)||0)"></div>`;
  let fields="";
  if(c.mode==="run"){
    fields=fieldRow("Durée","duration",c.duration,"min",1,1)+fieldRow("Vitesse","speed",c.speed,"km/h",0.1,0)+fieldRow("Inclinaison / pente","incline",c.incline,"%",0.5,0,30);
  } else if(c.mode==="swim"){
    fields=fieldRow("Distance","distance",c.distance,"m",50,0)+fieldRow("Durée","duration",c.duration,"min",1,1);
  } else {
    fields=fieldRow("Durée","duration",c.duration,"min",1,1)+fieldRow("Pente / inclinaison","incline",c.incline,"%",0.5,0,30)+fieldRow("Résistance","resistance",c.resistance,"1-20",1,1,20);
  }
  // Derived metrics
  let derived="";
  if(c.mode==="run"&&c.duration&&c.speed){const km=(c.speed*c.duration/60).toFixed(2);const pace=c.speed>0?(60/c.speed):0;const pMin=Math.floor(pace),pSec=Math.round((pace-pMin)*60);derived=`<div style="display:flex;gap:8px;margin-top:4px"><div class="stat-box"><div class="stat-val">${km}</div><div class="stat-lbl">km</div></div><div class="stat-box"><div class="stat-val">${pMin}:${String(pSec).padStart(2,"0")}</div><div class="stat-lbl">min/km</div></div></div>`;}
  else if(c.mode==="swim"&&c.duration&&c.distance){const pace=c.duration*60/(c.distance/100);const pM=Math.floor(pace/60),pS=Math.round(pace%60);derived=`<div style="display:flex;gap:8px;margin-top:4px"><div class="stat-box"><div class="stat-val">${pM}:${String(pS).padStart(2,"0")}</div><div class="stat-lbl">/100m</div></div><div class="stat-box"><div class="stat-val">${(c.distance/1000).toFixed(2)}</div><div class="stat-lbl">km</div></div></div>`;}
  return`<div style="padding:12px 16px;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:center"><button class="btn2" style="padding:5px 10px;font-size:11px" onclick="if(confirm('Quitter ?')){nav('home')}">←</button><div style="font-size:18px;font-weight:900;letter-spacing:3px;color:#06b6d4">CARDIO</div><div style="font-size:11px;color:var(--mt)">${Math.round(el/6e4)}min</div></div></div>
  <div class="card"><div style="display:flex;gap:6px;margin-bottom:14px">${modeTabs}</div>${fields}${derived}<div style="margin-top:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);font-weight:600;margin-bottom:4px">Notes</div><textarea class="inp" placeholder="Ressenti, météo, FC moyenne…" oninput="setCardio('notes',this.value)">${c.notes||""}</textarea></div><button class="btn btn-ok" style="margin-top:14px" onclick="finishCardio()">✓ Enregistrer</button></div>
  <div class="card"><div style="font-size:11px;color:var(--t2);line-height:1.5"><b style="color:#06b6d4">💡 Zones FC (220-âge)</b><br>Z2 endurance (60-70%) · Z3 tempo (70-80%) · Z4 seuil (80-90%) · Z5 VO2max (90-100%)<br><br><b style="color:#06b6d4">Pyramide polarisée</b> : 80% Z2 · 10% Z3 · 10% Z4-5 (Seiler 2010)</div></div>`;
}

// ═══ ACTIONS ═══
function nav(v){S.view=v;if(v!=="session")tStop();R();}
function goSess(id){S.sess=buildSession(id);S.ei=-1;S.log={};S.notes="";S.t0=Date.now();S.view="session";saveA();R();}
function goCardio(){S._cardioT0=Date.now();S.view="cardio";R();}
function finishCardio(){const c=S.cardio,m=c.mode,label=m==='run'?'Course':m==='swim'?'Nage':'Vélo',dur=c.duration||Math.round((Date.now()-(S._cardioT0||Date.now()))/6e4);const params=m==='run'?{duration:dur,speed:c.speed,incline:c.incline}:m==='swim'?{distance:c.distance,duration:dur}:{duration:dur,incline:c.incline,resistance:c.resistance};S.hist.unshift({id:""+Date.now(),sessionId:"cardio",sessionName:"CARDIO — "+label,phase:"",wodName:"",date:new Date().toISOString(),duration:dur,exercises:[],cardio:{mode:m,...params},notes:c.notes||""});S.cardio.notes="";S.view="home";saveS();saveA();R();}
function setEi(i){S.ei=i;saveA();R();}
function setPhase(i){S.phase=i;saveS();R();}
function setRIR(eid,rir){if(!S.log[eid])S.log[eid]={};S.log[eid].rir=rir;saveA();R();}
function onInp(el){const e=el.dataset.e,si=parseInt(el.dataset.s),f=el.dataset.f;if(!S.log[e])S.log[e]={};const p=S.log[e][si]||{weight:0,reps:0};if(f==="w")p.weight=parseFloat(el.value)||0;else p.reps=parseInt(el.value)||0;S.log[e][si]=p;saveA();const row=el.closest('.set-row');if(row){const n=row.querySelector('.set-num');const c=row.querySelector('div:last-child');if(n)n.className='set-num set-done';if(c){c.style.color='var(--ok)';c.textContent='✓';}}}
function finish(){const s=S.sess,ph=PHASES[S.phase],wod=pickWOD(s.id);S.hist.unshift({id:""+Date.now(),sessionId:s.id,sessionName:s.name,phase:ph.name,wodName:wod?.name||"",date:new Date().toISOString(),duration:Math.round((Date.now()-S.t0)/6e4),exercises:s.exercises.map(x=>({id:x.id,name:x.name,sets:x.sets,reps:x.reps,muscle:x.muscle,logged:S.log[x.id]||{},rir:S.log[x.id]?.rir})),notes:S.notes});S.sess=null;saveS();saveA();S.view="home";R();}
// Chart helper exposed to HTML
window.getExChartHTML=function(n){const d=S.hist.filter(h=>h.exercises.some(e=>e.name===n)).reverse().map(h=>{const x=h.exercises.find(e=>e.name===n);const s=Object.values(x.logged||{});return{d:new Date(h.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}),kg:s.length?Math.max(...s.map(s=>s.weight||0)):0};}).slice(-10);return svgLine(d,"d","kg","#457B9D",300,120);};
function doExp(){document.getElementById("io").innerHTML=`<textarea class="inp" style="margin-top:10px;min-height:70px;font-size:9px" onclick="this.select()" readonly>${JSON.stringify({history:S.hist,phase:S.phase},null,2)}</textarea>`;}
function doImpUI(){document.getElementById("io").innerHTML=`<textarea class="inp" id="impT" style="margin-top:10px;min-height:50px;font-size:9px" placeholder="JSON..."></textarea><button class="btn" style="margin-top:8px" onclick="doImp()">Importer</button>`;}
function doImp(){try{const d=JSON.parse(document.getElementById("impT").value);if(d.history){S.hist=d.history;S.phase=d.phase||0;saveS();R();}}catch{alert("JSON invalide");}}
