<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--cd:#14141f;--cd2:#1a1a2a;--bd:#2a2a3a;--tx:#e8e8f0;--t2:#9898a8;--mt:#5a5a6a;--ac:#E63946;--ok:#2A9D8F;--wa:#F4A261;--ac10:rgba(230,57,70,.12);--ok10:rgba(42,157,143,.12)}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:75px;-webkit-tap-highlight-color:transparent}
.hdr{padding:18px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:900;letter-spacing:5px;color:var(--ac)}
.stats-row{display:flex;gap:6px;padding:0 14px;margin-bottom:14px}
.stat-box{flex:1;background:var(--cd);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--bd)}
.stat-val{font-size:22px;font-weight:900}.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-top:2px}
.sec-title{padding:0 14px 8px;font-size:13px;font-weight:800;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.card{background:var(--cd);border-radius:14px;border:1px solid var(--bd);padding:16px;margin:0 14px 10px}

.sess-inner{display:flex;justify-content:space-between;align-items:center}
.sess-name{font-size:20px;font-weight:900;letter-spacing:3px}
.sess-meta{font-size:11px;color:var(--mt);margin-top:4px}
.sess-muscles{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.muscle-tag{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600}
.reminder{background:var(--ok10);border-color:var(--ok)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--cd);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
.nav-btn{background:none;border:none;color:var(--mt);font-size:9px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 14px;font-family:inherit}
.nav-btn.active{color:var(--ac);font-weight:700}.nav-btn svg{width:20px;height:20px}
.btn{background:var(--ac);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}.btn:active{opacity:.8}
.btn-ok{background:var(--ok)}.btn2{background:none;color:var(--t2);border:1px solid var(--bd);border-radius:10px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.inp{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:14px;width:100%;box-sizing:border-box;font-family:monospace;outline:none}
.inp:focus{border-color:var(--ac)}textarea.inp{resize:vertical;min-height:50px;font-family:inherit}
.prog-bar{background:var(--bd);border-radius:4px;height:4px;margin-top:8px}.prog-fill{height:4px;border-radius:4px;transition:width .3s}
.pills{display:flex;gap:5px;padding:10px 14px;overflow-x:auto}
.pill{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}.pill.active{color:#fff;border-color:transparent}

.coaching-item{display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:11px;color:var(--t2)}
.sets-header{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;margin-bottom:6px}
.sets-header span{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.set-row{display:grid;grid-template-columns:34px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:5px}

.tbtn{border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.tbtn-go{background:var(--ok);color:#fff}.tbtn-pause{background:var(--ac);color:#fff}.tbtn-reset{background:none;color:var(--t2);border:1px solid var(--bd)}

.wu-card{border-bottom:1px solid var(--bd);padding:12px 0}.wu-card:last-child{border-bottom:none}
.wu-top{display:flex;gap:12px;align-items:flex-start}

.hist-detail{margin-top:8px;font-size:10px;color:var(--mt);display:none}.hist-detail.open{display:block}

.phase-badge{display:inline-block;font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}

<script>
// ═══ CONFIG ═══

const MC={chest:"#E63946",shoulders:"#457B9D",triceps:"#F4A261",back:"#457B9D",biceps:"#E76F51",quads:"#2A9D8F",hamstrings:"#264653",calves:"#E9C46A",core:"#2A9D8F"};
const PHASES=[
  {id:"force",name:"Force",weeks:"Sem 1-4",color:"#E63946",numSets:5,reps:"4-6",rest:180,desc:"Charges lourdes, repos longs"},
  {id:"hyper",name:"Hypertrophie",weeks:"Sem 5-8",color:"#457B9D",numSets:4,reps:"8-12",rest:90,desc:"Volume modéré, tempo contrôlé"},
  {id:"endurance",name:"Endurance / Deload",weeks:"Sem 9-10",color:"#2A9D8F",numSets:3,reps:"15-20",rest:60,desc:"Charges légères, récupération"}
];

// ═══ SOUND ═══
let audioCtx=null;
function playBeep(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    // Play 3 beeps
    [0,0.2,0.4].forEach(delay=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;osc.type="sine";
      gain.gain.value=0.3;
      osc.start(audioCtx.currentTime+delay);
      osc.stop(audioCtx.currentTime+delay+0.15);
    });
  }catch(e){console.log("Audio err",e);}
}

// ═══ TIMER (timestamp-based, survives tab switch) ═══
let timerState={running:false,startedAt:0,totalSecs:0,dir:"down",pausedRemaining:0,done:false};
let timerRAF=null;

function timerGetRemaining(){
  if(!timerState.running)return timerState.pausedRemaining;
  const elapsed=Math.floor((Date.now()-timerState.startedAt)/1000);
  if(timerState.dir==="down")return Math.max(0,timerState.pausedRemaining-elapsed);
  else return Math.min(timerState.totalSecs,elapsed+timerState.pausedRemaining);
}
function timerTick(){
  const rem=timerGetRemaining();
  const display=timerState.dir==="down"?rem:rem;
  const pct=timerState.dir==="down"?(timerState.totalSecs-rem)/timerState.totalSecs:rem/timerState.totalSecs;
  // Update UI without re-rendering
  const d=document.getElementById("tdisp"),r=document.getElementById("tring"),bx=document.getElementById("timerbox");
  if(d)d.textContent=`${Math.floor(display/60)}:${String(display%60).padStart(2,"0")}`;
  if(r){r.style.strokeDashoffset=2*Math.PI*22*(1-pct);r.style.transition="stroke-dashoffset .3s";}
  if((timerState.dir==="down"&&rem<=0)||(timerState.dir!=="down"&&rem>=timerState.totalSecs)){
    timerState.running=false;timerState.done=true;
    if(r)r.setAttribute("stroke","var(--ok)");
    if(bx)bx.classList.add("done");
    const b=document.getElementById("tbtn");if(b){b.textContent="✓ Fini";b.className="tbtn tbtn-go";}
    playBeep();
    cancelAnimationFrame(timerRAF);return;
  }
  timerRAF=requestAnimationFrame(timerTick);
}
function tToggle(total,dir){
  if(timerState.done)return;
  timerState.dir=dir||"down";timerState.totalSecs=total;
  if(timerState.running){
    timerState.running=false;
    timerState.pausedRemaining=timerGetRemaining();
    cancelAnimationFrame(timerRAF);
    const b=document.getElementById("tbtn");if(b){b.textContent="Start";b.className="tbtn tbtn-go";}
  }else{
    if(timerState.pausedRemaining===0&&!timerState.startedAt)timerState.pausedRemaining=timerState.dir==="down"?total:0;
    timerState.startedAt=Date.now();timerState.running=true;
    const b=document.getElementById("tbtn");if(b){b.textContent="Pause";b.className="tbtn tbtn-pause";}
    timerTick();
  }
}
function tReset(total,dir){
  cancelAnimationFrame(timerRAF);
  timerState={running:false,startedAt:0,totalSecs:total,dir:dir||"down",pausedRemaining:dir==="up"?0:total,done:false};
  const d=document.getElementById("tdisp"),r=document.getElementById("tring"),bx=document.getElementById("timerbox"),b=document.getElementById("tbtn");
  const secs=timerState.pausedRemaining;
  if(d)d.textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`;
  if(r){r.style.strokeDashoffset=2*Math.PI*22;r.setAttribute("stroke",MC[S.sess?.exercises?.[S.ei]?.muscle]||"var(--ac)");}
  if(bx)bx.classList.remove("done");
  if(b){b.textContent="Start";b.className="tbtn tbtn-go";}
}
function tStop(){cancelAnimationFrame(timerRAF);timerState={running:false,startedAt:0,totalSecs:0,dir:"down",pausedRemaining:0,done:false};}

const PROG={sessions:[

const SK="apex-fit-v7";
let S={view:"home",hist:[],sess:null,ei:-1,log:{},notes:"",t0:null,phase:0};

function loadS(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){const d=JSON.parse(raw);if(d.history)S.hist=d.history;if(d.phase!==undefined)S.phase=d.phase;}
    // Restore active session if any
    const active=localStorage.getItem(SK+"_active");
    if(active){const a=JSON.parse(active);S.sess=PROG.sessions.find(s=>s.id===a.sessId)||null;S.ei=a.ei;S.log=a.log||{};S.notes=a.notes||"";S.t0=a.t0;if(S.sess)S.view="session";}
  }catch(e){console.log("load err",e);}
}
function saveS(){try{localStorage.setItem(SK,JSON.stringify({history:S.hist,phase:S.phase}));}catch{}}
function saveActive(){
  try{
    if(S.sess)localStorage.setItem(SK+"_active",JSON.stringify({sessId:S.sess.id,ei:S.ei,log:S.log,notes:S.notes,t0:S.t0}));
    else localStorage.removeItem(SK+"_active");
  }catch{}
}

// ═══ CSV EXPORT ═══
function exportCSV(){
  let csv="Date;Session;Phase;Durée (min);Exercice;Muscle;Set;Kg;Reps;Volume;Notes\n";
  S.hist.forEach(h=>{
    h.exercises.forEach(ex=>{
      const sets=Object.entries(ex.logged||{});
      if(sets.length===0)csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.phase||""};${h.duration};${ex.name};${ex.muscle};;;;;\n`;
      else sets.forEach(([si,s])=>{csv+=`${new Date(h.date).toLocaleDateString("fr-FR")};${h.sessionName};${h.phase||""};${h.duration};${ex.name};${ex.muscle};${parseInt(si)+1};${s.weight};${s.reps};${(s.weight||0)*(s.reps||0)};${(h.notes||"").replace(/;/g,",")}\n`;});
    });
  });
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`apex-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ═══ CHARTS (pure SVG) ═══
function renderChart(data,labelKey,valueKey,color,w,h){
  if(!data.length)return'<div style="text-align:center;color:var(--mt);padding:20px;font-size:11px">Pas encore de données</div>';
  const vals=data.map(d=>d[valueKey]);
  const max=Math.max(...vals)||1;
  const min=Math.min(...vals);
  const barW=Math.min(30,Math.floor((w-40)/data.length)-4);
  const chartH=h-30;
  let bars="";
  data.forEach((d,i)=>{
    const bh=Math.max(2,(d[valueKey]/max)*chartH);
    const x=30+i*(barW+4);
    const y=chartH-bh;
    bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${color}" opacity=".8"><title>${d[labelKey]}: ${d[valueKey]}</title></rect>`;
    if(data.length<=12)bars+=`<text x="${x+barW/2}" y="${chartH+12}" text-anchor="middle" font-size="8" fill="var(--mt)">${d[labelKey]}</text>`;
  });
  // Y axis labels
  bars+=`<text x="25" y="10" text-anchor="end" font-size="8" fill="var(--mt)">${max}</text>`;
  bars+=`<text x="25" y="${chartH}" text-anchor="end" font-size="8" fill="var(--mt)">0</text>`;
  bars+=`<line x1="28" y1="0" x2="28" y2="${chartH}" stroke="var(--bd)" stroke-width="1"/>`;
  bars+=`<line x1="28" y1="${chartH}" x2="${w}" y2="${chartH}" stroke="var(--bd)" stroke-width="1"/>`;
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}
function renderLineChart(data,labelKey,valueKey,color,w,h){
  if(data.length<2)return renderChart(data,labelKey,valueKey,color,w,h);
  const vals=data.map(d=>d[valueKey]);
  const max=Math.max(...vals)||1;
  const chartH=h-30;const chartW=w-40;
  const stepX=chartW/(data.length-1);
  let pts="",dots="",labels="";
  data.forEach((d,i)=>{
    const x=30+i*stepX;const y=chartH-(d[valueKey]/max)*chartH;
    pts+=(i===0?"M":" L")+`${x},${y}`;
    dots+=`<circle cx="${x}" cy="${y}" r="4" fill="${color}"><title>${d[labelKey]}: ${d[valueKey]} kg</title></circle>`;
    if(data.length<=12)labels+=`<text x="${x}" y="${chartH+14}" text-anchor="middle" font-size="8" fill="var(--mt)">${d[labelKey]}</text>`;
  });
  let svg=`<line x1="28" y1="0" x2="28" y2="${chartH}" stroke="var(--bd)"/><line x1="28" y1="${chartH}" x2="${w}" y2="${chartH}" stroke="var(--bd)"/>`;
  svg+=`<text x="25" y="10" text-anchor="end" font-size="8" fill="var(--mt)">${max}</text>`;
  svg+=`<text x="25" y="${chartH}" text-anchor="end" font-size="8" fill="var(--mt)">0</text>`;
  svg+=`<path d="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=dots+labels;
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${svg}</svg>`;
}

function getWeeklyVolume(){
  const w={};
  S.hist.forEach(h=>{
    const d=new Date(h.date),ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+1);
    const k=ws.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
    if(!w[k])w[k]={sem:k,vol:0};
    h.exercises.forEach(x=>Object.values(x.logged||{}).forEach(s=>{w[k].vol+=((s.weight||0)*(s.reps||0));}));
  });
  return Object.values(w).slice(-12);
}
function getExerciseProgress(name){
  return S.hist.filter(h=>h.exercises.some(e=>e.name===name)).reverse().map(h=>{
    const x=h.exercises.find(e=>e.name===name);const sets=Object.values(x.logged||{});
    return{date:new Date(h.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}),kg:sets.length?Math.max(...sets.map(s=>s.weight||0)):0};
  }).slice(-12);
}
function getAllExNames(){const n=new Set();S.hist.forEach(h=>h.exercises.forEach(e=>{if(Object.keys(e.logged||{}).length)n.add(e.name);}));return[...n];}

    </div>`;
  } else if(isWod){
    const wt=s.wod.duration?`<div class="timer" id="timerbox"><div class="timer-circle"><svg viewBox="0 0 52 52" style="transform:rotate(-90deg)"><circle cx="26" cy="26" r="22" fill="none" stroke="var(--bd)" stroke-width="3"/><circle id="tring" cx="26" cy="26" r="22" fill="none" stroke="var(--wa)" stroke-width="3" stroke-dasharray="${2*Math.PI*22}" stroke-dashoffset="${2*Math.PI*22}" stroke-linecap="round"/></svg><div class="timer-time" id="tdisp">0:00</div></div><div style="flex:1"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:5px;font-weight:600">⏱ ${s.wod.type} ${s.wod.duration}min</div><div style="display:flex;gap:6px"><button class="tbtn tbtn-go" id="tbtn" onclick="tToggle(${s.wod.duration*60},'up')">Start</button><button class="tbtn tbtn-reset" onclick="tReset(${s.wod.duration*60},'up')">Reset</button></div></div></div>`:"";
    content=`<div class="card"><div style="font-size:18px;font-weight:900;letter-spacing:3px;color:var(--wa);margin-bottom:10px">WOD — ${s.wod.type}</div>${wt}<div style="margin-top:14px">${s.wod.movements.map(m=>`<div class="wod-move"><div class="wod-bullet" style="background:var(--wa)"></div>${m}</div>`).join("")}</div><div style="margin-top:16px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:6px;font-weight:600">Notes</div><textarea class="inp" id="sessNotes" placeholder="Ressenti, PR..." oninput="S.notes=this.value;saveActive()">${S.notes}</textarea></div><button class="btn btn-ok" style="margin-top:14px" onclick="finish()">✓ Terminer</button></div>`;
  }
  return`<div style="padding:12px 16px;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:center"><button class="btn2" style="padding:5px 10px;font-size:11px" onclick="if(confirm('Quitter ?')){S.sess=null;saveActive();nav('home')}">←</button><div style="font-size:18px;font-weight:900;letter-spacing:3px;color:${s.color}">${s.name}</div><div style="font-size:11px;color:var(--mt)">${elapsed}min</div></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${s.color}"></div></div></div><div class="pills">${pills}</div>${content}`;
}

function rHist(){
  const names=getAllExNames();
  let charts="";
  // Weekly volume chart
  const wv=getWeeklyVolume();
  if(wv.length>1)charts+=`<div class="chart-wrap"><div class="chart-title">Volume hebdo (kg × reps)</div>${renderChart(wv,"sem","vol","#E63946",320,140)}</div>`;
  // Exercise selector + line chart
  if(names.length){
    const sel=names[0];
    charts+=`<div class="chart-wrap"><div class="chart-title">Évolution poids max par exercice</div><select class="inp" style="margin-bottom:10px" onchange="updateExChart(this.value)">${names.map(n=>`<option value="${n}">${n}</option>`).join("")}</select><div id="exChart">${renderLineChart(getExerciseProgress(sel),"date","kg","#457B9D",320,140)}</div></div>`;
  }
  if(!S.hist.length)return`<div class="hdr"><div class="logo">HISTORIQUE</div></div>${charts}<div class="card" style="text-align:center;color:var(--mt);padding:30px">Aucune séance 💪</div>`;
  return`<div class="hdr"><div class="logo">HISTORIQUE</div></div>
  <div style="padding:0 14px 8px"><button class="btn2" style="width:100%" onclick="exportCSV()">📊 Exporter CSV (Excel)</button></div>${charts}`+
  S.hist.map((h,hi)=>{const col=PROG.sessions.find(s=>s.id===h.sessionId)?.color||"var(--ac)";
    const detId="d"+hi;
    const details=h.exercises.map(x=>{const sets=Object.entries(x.logged||{});return sets.length?sets.map(([si,s])=>`<div style="display:grid;grid-template-columns:1fr 40px 40px 50px;gap:4px;font-size:10px;padding:2px 0"><span>${x.name}</span><span>${s.weight}kg</span><span>${s.reps}r</span><span style="color:var(--mt)">${(s.weight||0)*(s.reps||0)}</span></div>`).join(""):`<div style="font-size:10px;color:var(--mt)">${x.name}: —</div>`;}).join("");
    return`<div class="card"><div class="hist-top"><div style="font-size:14px;font-weight:900;letter-spacing:2px;color:${col}">${h.sessionName}${h.phase?`<span class="phase-badge" style="background:var(--cd2);color:var(--t2)">${h.phase}</span>`:''}</div><div style="font-size:10px;color:var(--mt)">${new Date(h.date).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})} • ${h.duration}min</div></div><div class="hist-exos">${h.exercises.map(x=>{const b=Math.max(0,...Object.values(x.logged||{}).map(s=>s.weight||0));return`<div class="hist-exo">${x.name}: <b>${b}kg</b></div>`;}).join("")}</div>${h.notes?`<div style="font-size:11px;color:var(--mt);margin-top:6px;font-style:italic">"${h.notes}"</div>`:''}<button class="hist-toggle" onclick="const d=document.getElementById('${detId}');d.classList.toggle('open');this.textContent=d.classList.contains('open')?'Masquer':'Détails'">Détails</button><div class="hist-detail" id="${detId}"><div style="display:grid;grid-template-columns:1fr 40px 40px 50px;gap:4px;font-size:9px;color:var(--mt);padding:4px 0;border-bottom:1px solid var(--bd);font-weight:600"><span>Exercice</span><span>Kg</span><span>Reps</span><span>Vol.</span></div>${details}</div></div>`;}).join("");
}

function rSett(){
  return`<div class="hdr"><div class="logo">RÉGLAGES</div></div>
  <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Périodisation</div>${PHASES.map((p,i)=>`<div onclick="setPhase(${i})" style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;border:2px solid ${S.phase===i?p.color:'var(--bd)'};background:${S.phase===i?p.color+'15':'none'}"><div style="width:12px;height:12px;border-radius:50%;background:${p.color}"></div><div><div style="font-size:13px;font-weight:700;color:${p.color}">${p.name} <span style="font-weight:400;font-size:11px;color:var(--mt)">${p.weeks}</span></div><div style="font-size:11px;color:var(--t2)">${p.desc} — ${p.numSets}×${p.reps} — repos ${p.rest}s</div></div></div>`).join("")}</div>
  <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:12px">Données</div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn2" onclick="exportCSV()">📊 CSV (Excel)</button><button class="btn2" onclick="doExport()">📤 JSON (backup)</button><button class="btn2" onclick="doShowImport()">📥 Importer</button>${S.hist.length?`<button class="btn2" style="color:var(--ac);border-color:var(--ac)" onclick="if(confirm('Supprimer ?')){S.hist=[];saveS();R();}">🗑 Effacer</button>`:""}</div><div id="ioArea"></div></div>
  <div class="card"><div style="font-size:11px;color:var(--t2);line-height:1.6"><b style="color:var(--wa)">⚠️ Sauvegarde</b> : tes données sont en localStorage. Exporte régulièrement en CSV ou JSON.<br><br><b style="color:var(--ac)">APEX FITNESS</b> v5.0</div></div>`;
}

// ═══ ACTIONS ═══
function nav(v){S.view=v;tStop();R();}
function goSess(id){S.sess=PROG.sessions.find(s=>s.id===id);S.ei=-1;S.log={};S.notes="";S.t0=Date.now();S.view="session";saveActive();R();}
function setEi(i){S.ei=i;tStop();timerState={running:false,startedAt:0,totalSecs:0,dir:"down",pausedRemaining:0,done:false};saveActive();R();}
function setPhase(i){S.phase=i;saveS();R();}

// Input handler — saves without full re-render
function onInput(el){
  const eid=el.dataset.eid,si=parseInt(el.dataset.si),f=el.dataset.f;
  if(!S.log[eid])S.log[eid]={};
  const prev=S.log[eid][si]||{weight:0,reps:0};
  if(f==="w")prev.weight=parseFloat(el.value)||0;
  else prev.reps=parseInt(el.value)||0;
  S.log[eid][si]=prev;
  saveActive();
  // Update check mark without re-render
  const row=el.closest('.set-row');
  if(row){
    const numEl=row.querySelector('.set-num');
    const checkEl=row.querySelector('div:last-child');
    if(numEl){numEl.className='set-num set-done';}
    if(checkEl){checkEl.style.color='var(--ok)';checkEl.textContent='✓';}
  }
}

function finish(){
  const s=S.sess,ph=PHASES[S.phase];
  const entry={id:""+Date.now(),sessionId:s.id,sessionName:s.name,phase:ph.name,date:new Date().toISOString(),duration:Math.round((Date.now()-S.t0)/6e4),exercises:s.exercises.map(x=>({id:x.id,name:x.name,sets:x.sets,reps:x.reps,muscle:x.muscle,logged:S.log[x.id]||{}})),notes:S.notes};
  S.hist.unshift(entry);
  S.sess=null;saveS();saveActive();S.view="home";R();
}

function updateExChart(name){const el=document.getElementById("exChart");if(el)el.innerHTML=renderLineChart(getExerciseProgress(name),"date","kg","#457B9D",320,140);}
function doExport(){const j=JSON.stringify({history:S.hist,phase:S.phase,exported:new Date().toISOString()},null,2);document.getElementById("ioArea").innerHTML=`<textarea class="inp" style="margin-top:10px;min-height:80px;font-size:9px" onclick="this.select()" readonly>${j}</textarea>`;}
function doShowImport(){document.getElementById("ioArea").innerHTML=`<textarea class="inp" id="impTxt" style="margin-top:10px;min-height:60px;font-size:9px" placeholder="Colle JSON..."></textarea><button class="btn" style="margin-top:8px" onclick="doImport()">Importer</button>`;}
function doImport(){try{const d=JSON.parse(document.getElementById("impTxt").value);if(d.history){S.hist=d.history;if(d.phase!==undefined)S.phase=d.phase;saveS();R();}}catch{alert("JSON invalide");}}

// ═══ INIT ═══
loadS();R();
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});</script>
</body></html>
